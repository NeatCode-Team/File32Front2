<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asymmetrical Grid</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#111;
  padding:20px;
  font-family:sans-serif;
}

.grid{

  display:grid;

  /* ستون‌های پایه */
  grid-template-columns:repeat(6,1fr);

  /* ارتفاع همه ردیف‌ها */
  grid-auto-rows: 220px;

  gap:16px;

}

/* آیتم پایه */
.item{

  position:relative;
  overflow:hidden;

  border-radius:22px;

  background:#222;

}

/* عکس */
.item img{

  width:100%;
  height:100%;

  object-fit:cover;

  display:block;

  transition:.4s;

}

.item:hover img{
  transform:scale(1.05);
}

/* سایزهای مختلف */

.wide{
  grid-column:span 2;
}

.big{
  grid-column:span 3;
}

.small{
  grid-column:span 1;
}

.huge{
  grid-column:span 4;
}

/* ریسپانسیو */

@media(max-width:900px){

  .grid{
    grid-template-columns:repeat(3,1fr);
  }

  .huge,
  .big{
    grid-column:span 3;
  }

}

@media(max-width:600px){

  .grid{
    grid-template-columns:1fr;
  }

  .item{
    grid-column:span 1 !important;
  }

}

</style>
</head>
<body>

<div class="grid">

  <div class="item huge">
    <img src="https://picsum.photos/1200/700?1">
  </div>

  <div class="item small">
    <img src="https://picsum.photos/400/700?2">
  </div>

  <div class="item wide">
    <img src="https://picsum.photos/800/700?3">
  </div>

  <div class="item big">
    <img src="https://picsum.photos/900/700?4">
  </div>

  <div class="item small">
    <img src="https://picsum.photos/500/700?5">
  </div>

  <div class="item wide">
    <img src="https://picsum.photos/800/700?6">
  </div>

  <div class="item huge">
    <img src="https://picsum.photos/1200/700?7">
  </div>

  <div class="item small">
    <img src="https://picsum.photos/500/700?8">
  </div>

  <div class="item big">
    <img src="https://picsum.photos/900/700?9">
  </div>

  <div class="item wide">
    <img src="https://picsum.photos/700/700?10">
  </div>

</div>

</body>
</html>
