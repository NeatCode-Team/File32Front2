<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../Assests/fontFramework/fontsAssets/style/fontStyle.css">
    <link rel="stylesheet" href="../Assests/bootstrap-5.3.3-dist/css/bootstrap.rtl.min.css">

    <title>لاگین کاربر</title>

    <style>
        body {
            margin: 0;
            font-family: Vazirmatn, sans-serif;
            background: url(/Assets/images/background.png);
            background-size: cover;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-box {
            width: 105px;
            height: 105px;
            background: #EEF2FF;
            border-radius: 14px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-box img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1E293B;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #475569;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
            background: #F8FAFC;
            font-size: 14px;
            outline: none;
        }

        .code-row {
            display: flex;
            gap: 10px;
        }

        .send-code {
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background-color: #ccc;
            color: black;
            cursor: pointer;
            white-space: nowrap;
        }

        .send-code:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background-color: #fdc13c;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        .error-text {
            color: #dc2626;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>

<body class="ff-Vazirmatn-Medium">
    <div class="login-card col-11 col-md-9 col-lg-5">

        <div class="logo">
            <div class="logo-box">
                <img src="/Assets/images/vecteezy_black-car-racing_8687649-1 1.png" alt="">
            </div>
        </div>

        <h2>ورود به حساب کاربری</h2>

        <form id="loginForm" method="post" action="/Account/Login">

            <input type="hidden" name="__RequestVerificationToken" value="TOKEN_FROM_BACKEND">

            <div class="form-group">
                <label class="mb-2">کد تایید</label>
                <div class="code-row">
                    <input id="verifyCode" name="verifyCode" maxlength="5" type="text" placeholder="کد پیامک شده">
                    <button type="button" class="send-code">ارسال کد</button>
                </div>
                <span class="error-text"></span>
            </div>

            <button type="submit" class="login-btn">تایید و ورود</button>
        </form>
    </div>

    <script>
        const form = document.querySelector("#loginForm");
        const sendCodeBtn = document.querySelector(".send-code");
        const codeInput = document.querySelector("#verifyCode");
        const tokenInput = document.querySelector('input[name="__RequestVerificationToken"]');
        const codeError = codeInput.closest('.form-group').querySelector('.error-text');

        let timerInterval = null;

        sendCodeBtn.addEventListener("click", async () => {
            if (codeError) codeError.textContent = "";

            if (timerInterval) return;

            sendCodeBtn.disabled = true;

            startTimer(120);

            try {
                // مثال درخواست به سرور
                /*
                const response = await fetch('/Account/SendCode', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'RequestVerificationToken': tokenInput ? tokenInput.value : ''
                    },
                    body: JSON.stringify({ phoneNumber: "شماره موبایل" })
                });
                
                if (!response.ok) {
                    throw new Error("خطا در ارتباط با سرور");
                }
                */
                console.log("درخواست ارسال کد - می‌توانید اینجا کد مربوط به سرور را اضافه کنید");

            } catch (error) {
                clearInterval(timerInterval);
                timerInterval = null;
                sendCodeBtn.disabled = false;
                sendCodeBtn.textContent = "ارسال کد";
                alert("ارسال کد ناموفق بود");
            }
        });

        form.addEventListener("submit", (e) => {
            if (codeError) codeError.textContent = "";

            let hasError = false;

            if (codeInput.value.trim().length === 0) {
                if (codeError) codeError.textContent = "کد تایید را وارد کنید";
                hasError = true;
            }

            if (hasError) {
                e.preventDefault();
            }
        });

        function startTimer(seconds) {
            let timeLeft = seconds;

            function updateTimer() {
                const m = String(Math.floor(timeLeft / 60)).padStart(2, "0");
                const s = String(timeLeft % 60).padStart(2, "0");

                sendCodeBtn.textContent = `${m}:${s}`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    sendCodeBtn.textContent = "ارسال کد";
                    sendCodeBtn.disabled = false;
                }

                timeLeft--;
            }

            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }
    </script>
</body>

</html>
